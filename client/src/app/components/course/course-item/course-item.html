<div class="course-item">
  <img [src]="course.coverImageSrc" alt="{{ course.title }}" class="course-image" />
  <div class="course-details">
    <h2 class="course-title">course title: {{ course.title }}</h2>
    <p class="course-description">
      course description:
      <br />
      {{ course.description }}
    </p>
    course price:
    <span class="course-price">{{ course.price }}$</span>
  </div>
</div>
