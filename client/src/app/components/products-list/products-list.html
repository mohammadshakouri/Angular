<div>
  modern way
  <ul class="productList">
    @for (product of products; track product.name; let i = $index) {
    <li class="productItem">
      <strong>{{ i + 1 }}.</strong>
      <h3>{{ product.name }}</h3>
      <p>Price: {{ product.price }}</p>
      <p>{{ product.description }}</p>
    </li>
  }
  </ul>
</div>
