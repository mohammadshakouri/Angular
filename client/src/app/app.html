<div class="container">
    @if(isAuthenticated){
        <div>welcome</div>
        @switch (userStatus) {
            @case ("active") {
                <div>user is active</div>
            }
            @case ("disabled") {
                <div>user is disabled</div>
            }
            @default {
                <div>unknown status</div>
            }
        }
        <div>{{userStatus}}</div>
    }
    @else {
        <div>please login</div>
    }

</div>
