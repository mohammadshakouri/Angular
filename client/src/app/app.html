<div class="container mt-2">
  @if (isAuthenticated) {
    <div class="alert alert-success">
      <div>welcome</div>
      @switch (userStatus) {
        @case ('active') {
          <div>user is active</div>
        }
        @case ('disabled') {
          <div>user is disabled</div>
        }
        @default {
          <div>unknown status</div>
        }
      }
      <div>{{ userStatus }}</div>
      <button class="btn btn-danger mt-2" (click)="handleLogout()">Logout</button>
    </div>
  } @else {
    <div class="alert alert-warning mb-1">please login</div>
    <button class="btn btn-primary" (click)="handleLogin()">Login</button>
  }
  <my-form> </my-form>
  <products-list></products-list>
  <card>
    <div>hello from mohammad this will place in card</div>
    <p>This is the body content of the card.</p>
  </card>
</div>
