<div class="container mt-2">
  <nav-bar></nav-bar>
  @if (isAuthenticated) {
    <div class="alert alert-success mb-1">
      <span>welcome </span>
      <span>user is {{ userStatus }}</span>
      <span> and signal count is {{ signaleCount() }}</span>
      <span> and simple count is {{ simpleCount }}</span>
      <button class="btn btn-danger mx-2" (click)="handleLogout()">Logout</button>
    </div>
  } @else {
    <div class="alert alert-warning mb-1">
      <span>please login</span>
      <span> and signal count is {{ signaleCount() }}</span>
      <span> and simple count is {{ simpleCount }}</span>
      <button class="btn btn-primary" (click)="handleLogin()">Login</button>
    </div>
  }
  <router-outlet></router-outlet>
</div>
